<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Arcane Architect">
  <defs>
    <radialGradient id="disc" cx="50%" cy="44%" r="62%">
      <stop offset="0%" stop-color="#16302330"/>
      <stop offset="0%" stop-color="#163023"/>
      <stop offset="58%" stop-color="#0a160f"/>
      <stop offset="100%" stop-color="#05090a"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0dca4"/>
      <stop offset="45%" stop-color="#c8a86d"/>
      <stop offset="100%" stop-color="#8a6d3b"/>
    </linearGradient>
    <radialGradient id="crystal" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#d4faf1"/>
      <stop offset="70%" stop-color="#6fb7ae"/>
      <stop offset="100%" stop-color="#2c6b64"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9ef0e2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#9ef0e2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Round arcane disc -->
  <circle cx="32" cy="32" r="31.5" fill="url(#disc)"/>

  <!-- Diagonal 4-point star (shorter, secondary) -->
  <polygon points="46.1,17.9 37,32 46.1,46.1 32,37 17.9,46.1 27,32 17.9,17.9 32,27"
    fill="url(#gold)" opacity="0.7"/>

  <!-- Cardinal 4-point compass star (long, primary) -->
  <polygon points="32,4.5 36.4,27.6 59.5,32 36.4,36.4 32,59.5 27.6,36.4 4.5,32 27.6,27.6"
    fill="url(#gold)"/>

  <!-- Inner orbit ring -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#c2a46b" stroke-width="1" opacity="0.55"/>

  <!-- Crystal glow -->
  <circle cx="32" cy="32" r="13" fill="url(#halo)"/>

  <!-- Central memory crystal (rhombus) -->
  <polygon points="32,21 39,32 32,43 25,32" fill="url(#crystal)"/>
  <polygon points="32,24.5 35.6,32 32,39.5 28.4,32" fill="#ffffff" opacity="0.35"/>
  <circle cx="32" cy="31" r="1.6" fill="#ffffff"/>

  <!-- Aged-gold rim -->
  <circle cx="32" cy="32" r="30.5" fill="none" stroke="#c2a46b" stroke-width="2"/>
  <circle cx="32" cy="32" r="28.6" fill="none" stroke="#3a2c12" stroke-width="1" opacity="0.6"/>
</svg>
